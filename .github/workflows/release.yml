name: release

# Builds the standalone Windows slim.exe and attaches it to the GitHub Release
# whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip pyinstaller tiktoken

      - name: Pre-download tiktoken vocab (offline support)
        shell: pwsh
        run: |
          $env:TIKTOKEN_CACHE_DIR = "$PWD\vendor\tiktoken_cache"
          python -c "import tiktoken; tiktoken.get_encoding('o200k_base')"

      - name: Build slim.exe
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --clean --name slim `
            --collect-submodules filters `
            --collect-all tiktoken `
            --hidden-import tiktoken_ext `
            --hidden-import tiktoken_ext.openai_public `
            --add-data "vendor\tiktoken_cache;tiktoken_cache" `
            slim.py

      - name: Attach exe to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/slim.exe
