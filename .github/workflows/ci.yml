name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install
        run: python -m pip install --upgrade pip pytest tiktoken ruff bandit
      - name: Lint
        run: python -m ruff check .
      - name: Security scan
        # --severity-level medium: fail only on real issues (e.g. shell=True),
        # not the expected Low findings (subprocess import notice, defensive
        # except-pass in cmd_hook, assert-in-tests).
        run: python -m bandit -r . -x ./tests,./build,./dist --severity-level medium
      - name: Run tests
        run: python -m pytest -q
